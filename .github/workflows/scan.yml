name: Mode A — auto scan (free, rule-based)

# Runs twice daily: 04:00 & 16:00 UTC = 09:00 & 21:00 PKT.
# Also runnable by hand from the Actions tab (workflow_dispatch).
on:
  schedule:
    - cron: "0 4,16 * * *"
  workflow_dispatch:

# Mode A and Mode B both commit; this stops them colliding on push.
concurrency:
  group: comp-tracker-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run Mode-A scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Only flips the dashboard button on; Mode A never calls the AI.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scanner.py --once

      - name: Commit results (this also refreshes GitHub Pages)
        run: |
          git config user.name "comp-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json seen.json comp-data.js
          git commit -m "Mode A scan $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "nothing to commit"
          git pull --rebase --autostash origin "${{ github.ref_name }}" || true
          git push || echo "push failed (will retry next run)"

      # Last-gasp alert: fires when the JOB itself failed (e.g. install broke)
      # — crashes inside scanner.py already send their own Telegram message.
      - name: Telegram alert on workflow failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="⚠️ Comp Tracker: workflow FAILED (${{ github.workflow }} run #${{ github.run_number }}). The dashboard may not update until this is fixed — check the Actions tab." \
              > /dev/null || true
          fi
